services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-bot-api
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
